<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sight Reading Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Sight Reading Practice</h1>

    <div class="hud">
        <span class="progress" id="progress">1 / 10</span>
        <span class="timer" id="timer">0.0s</span>
        <span class="highscore" id="highscore"></span>
        <span class="reset-hs" id="resetHs" title="Reset high score">&#x2715;</span>
    </div>

    <div class="staff-container">
        <canvas id="staff"></canvas>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="start-panel" id="startPanel">
        <div class="option-group">
            <span class="label">Clef</span>
            <div class="clef-btns" id="clefBtns">
                <button data-clef="treble">Treble</button>
                <button data-clef="bass">Bass</button>
                <button data-clef="both" class="selected">Mixed</button>
            </div>
        </div>
        <div class="option-group">
            <span class="label">Notes at once</span>
            <div class="note-count-btns" id="noteCountBtns">
                <button data-count="1" class="selected">1</button>
                <button data-count="2">2</button>
                <button data-count="3">3</button>
                <button data-count="4">4</button>
            </div>
        </div>
        <div class="option-group">
            <span class="label">Include notes</span>
            <div class="note-toggle-btns" id="noteToggleBtns">
                <button class="selected" data-note-toggle="C">C</button>
                <button class="selected" data-note-toggle="D">D</button>
                <button class="selected" data-note-toggle="E">E</button>
                <button class="selected" data-note-toggle="F">F</button>
                <button class="selected" data-note-toggle="G">G</button>
                <button class="selected" data-note-toggle="A">A</button>
                <button class="selected" data-note-toggle="B">B</button>
            </div>
        </div>
        <button class="start-btn" id="startBtn">Start</button>
    </div>

    <div class="summary" id="summary">
        <h2>Round Complete</h2>
        <div class="stat" id="summaryTime"></div>
        <div class="stat" id="summaryAccuracy"></div>
        <div class="new-best" id="newBest" style="display:none"></div>
        <div class="stat" id="summaryBest"></div>
        <button id="playAgain">Play Again</button>
    </div>

    <div class="next-btn" id="nextBtn">NEXT</div>

    <div class="piano">
        <div class="keys">
            <div class="key" data-note="C2"><span>C2</span></div>
            <div class="key" data-note="D2"><span>D2</span></div>
            <div class="key" data-note="E2"><span>E2</span></div>
            <div class="key" data-note="F2"><span>F2</span></div>
            <div class="key" data-note="G2"><span>G2</span></div>
            <div class="key" data-note="A2"><span>A2</span></div>
            <div class="key" data-note="B2"><span>B2</span></div>
            <div class="key" data-note="C3"><span>C3</span></div>
            <div class="key" data-note="D3"><span>D3</span></div>
            <div class="key" data-note="E3"><span>E3</span></div>
            <div class="key" data-note="F3"><span>F3</span></div>
            <div class="key" data-note="G3"><span>G3</span></div>
            <div class="key" data-note="A3"><span>A3</span></div>
            <div class="key" data-note="B3"><span>B3</span></div>
            <div class="key" data-note="C4"><span>C4</span></div>
            <div class="key" data-note="D4"><span>D4</span></div>
            <div class="key" data-note="E4"><span>E4</span></div>
            <div class="key" data-note="F4"><span>F4</span></div>
            <div class="key" data-note="G4"><span>G4</span></div>
            <div class="key" data-note="A4"><span>A4</span></div>
            <div class="key" data-note="B4"><span>B4</span></div>
            <div class="key" data-note="C5"><span>C5</span></div>
            <div class="key" data-note="D5"><span>D5</span></div>
            <div class="key" data-note="E5"><span>E5</span></div>
            <div class="key" data-note="F5"><span>F5</span></div>
            <div class="key" data-note="G5"><span>G5</span></div>
            <div class="key" data-note="A5"><span>A5</span></div>
            <div class="key" data-note="B5"><span>B5</span></div>

            <div class="key black" data-note="C#2"><span>C#</span></div>
            <div class="key black" data-note="D#2"><span>D#</span></div>
            <div class="key black" data-note="F#2"><span>F#</span></div>
            <div class="key black" data-note="G#2"><span>G#</span></div>
            <div class="key black" data-note="A#2"><span>A#</span></div>
            <div class="key black" data-note="C#3"><span>C#</span></div>
            <div class="key black" data-note="D#3"><span>D#</span></div>
            <div class="key black" data-note="F#3"><span>F#</span></div>
            <div class="key black" data-note="G#3"><span>G#</span></div>
            <div class="key black" data-note="A#3"><span>A#</span></div>
            <div class="key black" data-note="C#4"><span>C#</span></div>
            <div class="key black" data-note="D#4"><span>D#</span></div>
            <div class="key black" data-note="F#4"><span>F#</span></div>
            <div class="key black" data-note="G#4"><span>G#</span></div>
            <div class="key black" data-note="A#4"><span>A#</span></div>
            <div class="key black" data-note="C#5"><span>C#</span></div>
            <div class="key black" data-note="D#5"><span>D#</span></div>
            <div class="key black" data-note="F#5"><span>F#</span></div>
            <div class="key black" data-note="G#5"><span>G#</span></div>
            <div class="key black" data-note="A#5"><span>A#</span></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
