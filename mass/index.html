<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Understanding the Mass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --burgundy: #6b1d2a;
            --burgundy-deep: #3e0f18;
            --burgundy-soft: #8a3040;
            --gold: #c9a84c;
            --gold-light: #e4d5a0;
            --gold-glow: #d4b85c;
            --cream: #faf9f7;
            --parchment: #f3f1ee;
            --warm-white: #f7f6f3;
            --text-dark: #1a1210;
            --text-muted: #4a3c3c;
            --text-light: #6b5a5a;
            --fixed-color: #c9a84c;
            --fixed-bg: rgba(201, 168, 76, 0.06);
            --fixed-border: rgba(201, 168, 76, 0.25);
            --variable-color: #7a6aa0;
            --variable-bg: rgba(122, 106, 160, 0.06);
            --variable-border: rgba(122, 106, 160, 0.25);
            --timeline-line: #ddd9d4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: var(--warm-white);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(201, 168, 76, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(107, 29, 42, 0.02) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(228, 213, 160, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== HERO ===== */
        .hero {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .rose-window {
            width: 160px;
            height: 160px;
            margin-bottom: 2.5rem;
            animation: fadeScale 2s ease-out forwards;
            opacity: 0;
        }

        .rose-window svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(201, 168, 76, 0.15));
        }

        .rose-petal { fill: none; stroke: var(--gold); stroke-width: 0.8; opacity: 0.7; }
        .rose-circle { fill: none; stroke: var(--gold); }
        .rose-circle-outer { stroke-width: 1.2; opacity: 0.5; }
        .rose-circle-inner { stroke-width: 0.6; opacity: 0.5; }
        .rose-center { fill: var(--gold); opacity: 0.6; }
        .cross-line { stroke: var(--gold); stroke-width: 0.8; opacity: 0.4; }

        .hero-title {
            font-family: 'Cinzel', Georgia, serif;
            font-weight: 600;
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            color: var(--burgundy);
            letter-spacing: 0.08em;
            text-align: center;
            line-height: 1.3;
            opacity: 0;
            animation: fadeUp 1.2s ease-out 0.3s forwards;
        }

        .ornament {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
        }

        .ornament-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .ornament-diamond {
            width: 6px;
            height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        .hero-subtitle {
            font-weight: 400;
            font-style: italic;
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            color: var(--text-muted);
            text-align: center;
            line-height: 1.7;
            max-width: 520px;
            opacity: 0;
            animation: fadeUp 1.2s ease-out 0.8s forwards;
        }

        .scroll-hint {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0;
            animation: fadeUp 1s ease-out 1.2s forwards;
        }

        .scroll-hint span {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .scroll-arrow {
            width: 20px;
            height: 20px;
            border-right: 1.5px solid var(--gold);
            border-bottom: 1.5px solid var(--gold);
            transform: rotate(45deg);
            animation: bobDown 2s ease-in-out infinite;
        }

        @keyframes bobDown {
            0%, 100% { transform: rotate(45deg) translateY(-3px); opacity: 0.5; }
            50% { transform: rotate(45deg) translateY(3px); opacity: 1; }
        }

        /* ===== LANGUAGE PICKER ===== */
        .lang-picker {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 10;
            display: flex;
            gap: 0;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(201, 168, 76, 0.3);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .lang-btn {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.45rem 0.7rem;
            border: none;
            cursor: pointer;
            background: rgba(247, 246, 243, 0.95);
            color: var(--text-muted);
            transition: background 0.2s, color 0.2s;
            backdrop-filter: blur(12px);
        }

        .lang-btn:not(:last-child) {
            border-right: 1px solid rgba(201, 168, 76, 0.2);
        }

        .lang-btn:hover {
            background: rgba(201, 168, 76, 0.15);
            color: var(--text-dark);
        }

        .lang-btn.active {
            background: var(--burgundy);
            color: var(--gold-light);
        }

        /* ===== LEGEND ===== */
        .legend {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(247, 246, 243, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(201, 168, 76, 0.15);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 0.85rem;
            transition: box-shadow 0.3s;
        }

        .legend.scrolled { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06); }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.fixed {
            background: var(--fixed-color);
            box-shadow: 0 0 6px rgba(201, 168, 76, 0.3);
        }

        .legend-dot.variable {
            background: var(--variable-color);
            box-shadow: 0 0 6px rgba(122, 106, 160, 0.3);
        }

        .legend-label {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* ===== TIMELINE ===== */
        .timeline-container {
            position: relative;
            z-index: 2;
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
        }

        /* ===== SECTION HEADERS ===== */
        .section-group { margin: 0; padding: 0; }

        .section-header {
            position: sticky;
            top: var(--legend-height, 40px);
            z-index: 10;
            margin: 0;
            padding: 1.5rem 0 1.5rem 60px;
            background: var(--warm-white);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .section-header.visible { opacity: 1; transform: translateY(0); }
        .section-header::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: calc(-50vw + 50%);
            width: 100vw;
            background: var(--warm-white);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            z-index: -1;
        }

        .section-marker {
            position: absolute;
            left: 14px;
            top: 1.55rem;
            width: 30px;
            height: 30px;
            border: 2px solid var(--burgundy);
            background: var(--warm-white);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        .section-marker-inner {
            width: 8px;
            height: 8px;
            background: var(--burgundy);
            transform: rotate(45deg);
        }

        .section-number {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 0.25rem;
        }

        .section-title {
            font-family: 'Cinzel', Georgia, serif;
            font-weight: 600;
            font-size: clamp(1.3rem, 3vw, 1.7rem);
            color: var(--burgundy);
            letter-spacing: 0.05em;
            line-height: 1.3;
        }

        .section-desc {
            font-style: italic;
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
            line-height: 1.5;
        }

        /* ===== TIMELINE ITEMS ===== */
        .timeline-item {
            position: relative;
            padding-left: 60px;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        /* Line segment connecting items within a section */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 28px;
            top: 0;
            bottom: -1.5rem;
            width: 2px;
            background: var(--timeline-line);
            z-index: 0;
        }

        /* First item in a section: start line from the node, not the top */
        .timeline-item.section-first {
            margin-top: 1.5rem;
        }
        .timeline-item.section-first::before {
            top: 1.3rem;
        }

        /* Last item in a section: end line at the node, not the bottom */
        .timeline-item.section-last::before {
            bottom: auto;
            height: calc(1.3rem + 6px);
        }

        .timeline-item.visible { opacity: 1; transform: translateY(0); }

        .timeline-node {
            position: absolute;
            left: 24px;
            top: 1.3rem;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            z-index: 5;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .timeline-item:hover .timeline-node { transform: scale(1.3); }

        .timeline-item.fixed .timeline-node {
            background: var(--fixed-color);
        }
        .timeline-item.fixed:hover .timeline-node { box-shadow: 0 0 10px rgba(201, 168, 76, 0.5); }

        .timeline-item.variable .timeline-node {
            background: var(--variable-color);
        }
        .timeline-item.variable:hover .timeline-node { box-shadow: 0 0 10px rgba(122, 106, 160, 0.5); }

        .timeline-card {
            padding: 1.25rem 1.5rem;
            border-radius: 4px;
            border: 1px solid;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            user-select: none;
        }

        .timeline-item:hover .timeline-card { transform: translateX(4px); }
        .timeline-item.expanded .timeline-card { transform: translateX(4px); }

        .timeline-item.fixed .timeline-card { background: var(--fixed-bg); border-color: var(--fixed-border); }
        .timeline-item.fixed:hover .timeline-card,
        .timeline-item.fixed.expanded .timeline-card { box-shadow: 0 4px 20px rgba(201, 168, 76, 0.1); }

        .timeline-item.variable .timeline-card { background: var(--variable-bg); border-color: var(--variable-border); }
        .timeline-item.variable:hover .timeline-card,
        .timeline-item.variable.expanded .timeline-card { box-shadow: 0 4px 20px rgba(122, 106, 160, 0.1); }

        .card-header {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            margin-bottom: 0.4rem;
        }

        .step-name {
            font-family: 'Cinzel', Georgia, serif;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.03em;
        }

        .timeline-item.fixed .step-name { color: #8a7230; }
        .timeline-item.variable .step-name { color: #5c4f7a; }

        .step-latin {
            font-style: italic;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .step-duration {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 0.8rem;
            color: var(--text-light);
            white-space: nowrap;
        }

        .step-type {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.15rem 0.5rem;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .timeline-item.fixed .step-type { color: var(--fixed-color); background: rgba(201, 168, 76, 0.1); }
        .timeline-item.variable .step-type { color: var(--variable-color); background: rgba(122, 106, 160, 0.1); }

        .expand-chevron {
            margin-left: auto;
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .expand-chevron svg { width: 14px; height: 14px; opacity: 0.35; transition: opacity 0.3s; }
        .timeline-item:hover .expand-chevron svg { opacity: 0.6; }
        .timeline-item.expanded .expand-chevron { transform: rotate(180deg); }
        .timeline-item.expanded .expand-chevron svg { opacity: 0.7; }
        .timeline-item.fixed .expand-chevron svg { stroke: #8a7230; }
        .timeline-item.variable .expand-chevron svg { stroke: #5c4f7a; }

        .step-description {
            font-size: 1.05rem;
            line-height: 1.65;
            color: var(--text-muted);
        }

        .step-note {
            margin-top: 0.6rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            font-size: 0.95rem;
            font-style: italic;
            color: var(--text-light);
            line-height: 1.5;
        }

        /* ===== EXPANDABLE DETAIL ===== */
        .step-detail {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.45s ease, opacity 0.35s ease, margin-top 0.35s ease;
            margin-top: 0;
        }

        .timeline-item.expanded .step-detail {
            max-height: 600px;
            opacity: 1;
            margin-top: 0.8rem;
        }

        .step-detail-inner {
            padding-top: 0.8rem;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
        }

        .detail-section { margin-bottom: 0.75rem; }
        .detail-section:last-child { margin-bottom: 0; }

        .detail-label {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 0.3rem;
        }

        .detail-text {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .detail-text em { color: var(--text-dark); font-style: italic; }

        .detail-quote {
            font-style: italic;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-dark);
            padding-left: 1rem;
            border-left: 2px solid var(--gold-light);
            margin: 0.4rem 0;
        }

        .detail-tip {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.03);
            padding: 0.6rem 0.8rem;
            border-radius: 3px;
            margin-top: 0.3rem;
        }

        /* ===== FOOTER ===== */
        .footer {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 4rem 2rem;
            border-top: 1px solid rgba(201, 168, 76, 0.15);
        }

        .footer-ornament-inline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .footer-ornament-inline .ornament-line { width: 40px; }

        .footer p {
            font-style: italic;
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 480px;
            margin: 0 auto;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-light);
            font-style: normal;
        }

        .bottom-border {
            position: relative;
            z-index: 2;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold-light) 20%, var(--gold) 50%, var(--gold-light) 80%, transparent);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .rose-window { width: 120px; height: 120px; margin-bottom: 2rem; }
            .ornament-line { width: 40px; }
            .timeline-container { padding: 2rem 1rem 4rem; }
            .section-header { padding-left: 48px; padding-right: 0.5rem; padding-top: 1rem; padding-bottom: 1rem; }
            .section-marker { left: 7px; width: 28px; height: 28px; }
            .timeline-item::before { left: 20px; }
            .timeline-item { padding-left: 48px; margin-bottom: 1.25rem; }
            .timeline-node { left: 17px; width: 8px; height: 8px; }
            .timeline-card { padding: 1rem 1.15rem; }
            .card-header { flex-wrap: wrap; gap: 0.35rem; }
            .step-type { margin-left: 0; order: -1; width: fit-content; }
            .legend { gap: 1rem; padding: 0.7rem 1rem; }
            .lang-picker { top: 0.5rem; right: 0.5rem; }
            .lang-btn { padding: 0.35rem 0.5rem; font-size: 0.6rem; }
        }

        @media (max-width: 380px) {
            .legend { flex-direction: column; gap: 0.3rem; align-items: center; }
        }
    </style>
</head>
<body>

    <!-- ===== LANGUAGE PICKER ===== -->
    <div class="lang-picker">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="pl">PL</button>
        <button class="lang-btn" data-lang="nl">NL</button>
    </div>

    <!-- ===== HERO ===== -->
    <header class="hero">
        <div class="rose-window">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle class="rose-circle rose-circle-outer" cx="50" cy="50" r="48" />
                <ellipse class="rose-petal" cx="50" cy="30" rx="8" ry="18" transform="rotate(0 50 50)" />
                <ellipse class="rose-petal" cx="50" cy="30" rx="8" ry="18" transform="rotate(45 50 50)" />
                <ellipse class="rose-petal" cx="50" cy="30" rx="8" ry="18" transform="rotate(90 50 50)" />
                <ellipse class="rose-petal" cx="50" cy="30" rx="8" ry="18" transform="rotate(135 50 50)" />
                <ellipse class="rose-petal" cx="50" cy="30" rx="8" ry="18" transform="rotate(180 50 50)" />
                <ellipse class="rose-petal" cx="50" cy="30" rx="8" ry="18" transform="rotate(225 50 50)" />
                <ellipse class="rose-petal" cx="50" cy="30" rx="8" ry="18" transform="rotate(270 50 50)" />
                <ellipse class="rose-petal" cx="50" cy="30" rx="8" ry="18" transform="rotate(315 50 50)" />
                <circle class="rose-circle rose-circle-inner" cx="50" cy="50" r="20" />
                <line class="cross-line" x1="50" y1="10" x2="50" y2="90" />
                <line class="cross-line" x1="10" y1="50" x2="90" y2="50" />
                <circle class="rose-center" cx="50" cy="50" r="3" />
            </svg>
        </div>

        <h1 class="hero-title" data-i18n="heroTitle">Understanding<br>the Mass</h1>

        <div class="ornament">
            <span class="ornament-line"></span>
            <span class="ornament-diamond"></span>
            <span class="ornament-line"></span>
        </div>

        <p class="hero-subtitle" data-i18n="heroSubtitle">A welcoming guide to the structure, prayers, and meaning of the Roman Catholic Mass &mdash; for newcomers and the curious alike.</p>

        <div class="scroll-hint">
            <span data-i18n="scrollHint">Scroll to begin</span>
            <div class="scroll-arrow"></div>
        </div>
    </header>

    <!-- ===== LEGEND ===== -->
    <nav class="legend" id="legend">
        <div class="legend-item">
            <span class="legend-dot fixed"></span>
            <span class="legend-label" data-i18n="legendFixed">Same every week</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot variable"></span>
            <span class="legend-label" data-i18n="legendVariable">Changes each week</span>
        </div>
    </nav>

    <!-- ===== TIMELINE ===== -->
    <div class="timeline-container" id="timeline"></div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="footer-ornament-inline">
            <span class="ornament-line"></span>
            <span class="ornament-diamond"></span>
            <span class="ornament-line"></span>
        </div>
        <p data-i18n="footerQuote">&ldquo;The Eucharist is the source and summit of the Christian life.&rdquo;</p>
        <p class="footer-note" data-i18n="footerSource">&mdash; Lumen Gentium, 11</p>
    </footer>

    <div class="bottom-border"></div>

                                { label: 'Why it matters', type: 'text', content: 'Catholics believe that at the Consecration, a miracle occurs: the substance of the bread and wine is transformed into the Body and Blood of Christ, while retaining the appearance of bread and wine. This is called <em>transubstantiation</em>. The Mass is understood not as a re-sacrifice, but as making present the one sacrifice of Christ on the Cross.' }

                                { label: 'Co robić', type: 'tip', content: 'Uklęknij, jeśli możesz (to najbardziej uroczysta postawa w tej części Mszy). Niektórzy pochylają głowę podczas podniesienia; inni patrzą na konsekrowane postacie. To chwila cichej adoracji.' },

                                { label: 'Wat te doen', type: 'tip', content: 'Kniel als je kunt (dit is de meest eerbiedige houding voor dit deel van de Mis). Sommigen buigen het hoofd tijdens de opheffing; anderen kijken naar de geconsacreerde gedaanten. Dit is een moment van stille aanbidding.' },

                            ]

    // ===== UI TRANSLATIONS =====
    const UI = {
        heroTitle: { en: 'Understanding<br>the Mass', pl: 'Zrozumieć<br>Mszę Świętą', nl: 'De Mis<br>begrijpen' },
        heroSubtitle: {
            en: 'A welcoming guide to the structure, prayers, and meaning of the Roman Catholic Mass \u2014 for newcomers and the curious alike.',
            pl: 'Przyjazny przewodnik po strukturze, modlitwach i znaczeniu Mszy Świętej w Kościele rzymskokatolickim \u2014 dla nowo przybyłych i ciekawych.',
            nl: 'Een toegankelijke gids over de structuur, gebeden en betekenis van de Rooms-Katholieke Mis \u2014 voor nieuwkomers en nieuwsgierigen.'
        },
        scrollHint: { en: 'Scroll to begin', pl: 'Przewiń, aby rozpocząć', nl: 'Scroll om te beginnen' },
        legendFixed: { en: 'Same every week', pl: 'Takie samo co tydzień', nl: 'Elke week hetzelfde' },
        legendVariable: { en: 'Changes each week', pl: 'Zmienia się co tydzień', nl: 'Verandert elke week' },
        typeVariable: { en: 'Variable', pl: 'Zmienne', nl: 'Variabel' },
        footerQuote: {
            en: '\u201cThe Eucharist is the source and summit of the Christian life.\u201d',
            pl: '\u201eEucharystia jest źródłem i szczytem życia chrześcijańskiego.\u201d',
            nl: '\u201eDe Eucharistie is de bron en het hoogtepunt van het christelijk leven.\u201d'
        },
        footerSource: { en: '\u2014 Lumen Gentium, 11', pl: '\u2014 Lumen Gentium, 11', nl: '\u2014 Lumen Gentium, 11' },
        min: { en: 'min', pl: 'min', nl: 'min' }
    };

    // ===== CURRENT LANGUAGE =====
    let currentLang = localStorage.getItem('mass-lang') || 'en';

    // ===== RENDER TIMELINE =====
    function renderTimeline(lang) {
        const container = document.getElementById('timeline');
        let html = '';

        DATA.sections.forEach((section) => {
            html += `<div class="section-group">
                <div class="section-header">
                    <div class="section-marker"><div class="section-marker-inner"></div></div>
                    <div class="section-number">${section.part[lang]}</div>
                    <h2 class="section-title">${section.title[lang]}</h2>
                    <p class="section-desc">${section.desc[lang]}</p>
                </div>`;

            const lastIdx = section.steps.length - 1;
            section.steps.forEach((step, i) => {
                const posClass = i === 0 && lastIdx === 0 ? 'section-first section-last' : i === 0 ? 'section-first' : i === lastIdx ? 'section-last' : '';
                const typeLabel = step.type === 'variable' ? `<span class="step-type">${UI.typeVariable[lang]}</span>` : '';
                const latinLabel = step.latin ? `<span class="step-latin">${step.latin[lang]}</span>` : '';
                const durationLabel = step.duration ? `<span class="step-duration">${step.duration} ${UI.min[lang]}</span>` : '';
                const noteHtml = step.note ? `<p class="step-note">${step.note[lang]}</p>` : '';

                let detailHtml = '';
                if (step.detail && step.detail[lang]) {
                    const sections = step.detail[lang].map((d) => {
                        let contentEl;
                        if (d.type === 'quote') contentEl = `<div class="detail-quote">${d.content}</div>`;
                        else if (d.type === 'tip') contentEl = `<div class="detail-tip">${d.content}</div>`;
                        else contentEl = `<div class="detail-text">${d.content}</div>`;
                        return `<div class="detail-section"><div class="detail-label">${d.label}</div>${contentEl}</div>`;
                    }).join('');

                    detailHtml = `<div class="step-detail"><div class="step-detail-inner">${sections}</div></div>`;
                }

                html += `
                    <div class="timeline-item ${step.type} ${posClass}">
                        <div class="timeline-node"></div>
                        <div class="timeline-card">
                            <div class="card-header">
                                <span class="step-name">${step.name[lang]}</span>
                                ${latinLabel}
                                ${typeLabel}
                                ${durationLabel}
                                ${CHEVRON}
                            </div>
                            <p class="step-description">${step.desc[lang]}</p>
                            ${noteHtml}
                            ${detailHtml}
                        </div>
                    </div>`;
            });
            html += `</div>`; /* close section-group */
        });

        container.innerHTML = html;
        initTimelineObservers();
        initCardClicks();
        initStickyObservers();
    }

    // ===== UPDATE UI STRINGS =====
    function updateUI(lang) {
        document.querySelectorAll('[data-i18n]').forEach((el) => {
            const key = el.getAttribute('data-i18n');
            if (UI[key] && UI[key][lang]) {
                el.innerHTML = UI[key][lang];
            }
        });
        document.documentElement.lang = lang === 'pl' ? 'pl' : lang === 'nl' ? 'nl' : 'en';
        document.title = lang === 'pl' ? 'Zrozumieć Mszę Świętą' : lang === 'nl' ? 'De Mis begrijpen' : 'Understanding the Mass';
    }

    // ===== SET LANGUAGE =====
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('mass-lang', lang);

        document.querySelectorAll('.lang-btn').forEach((btn) => {
            btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
        });

        updateUI(lang);
        renderTimeline(lang);
    }

    // ===== OBSERVERS =====
    function initTimelineObservers() {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

        document.querySelectorAll('.timeline-item, .section-header').forEach((el) => obs.observe(el));
    }

    function initCardClicks() {
        document.querySelectorAll('.timeline-card').forEach((card) => {
            card.addEventListener('click', () => {
                const item = card.closest('.timeline-item');
                const detail = card.querySelector('.step-detail');
                if (!detail) return;

                item.classList.toggle('expanded');
            });
        });
    }

    // ===== INIT =====
    document.querySelectorAll('.lang-btn').forEach((btn) => {
        btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
    });

    // Legend shadow
    const legend = document.getElementById('legend');
    const heroEl = document.querySelector('.hero');
    const legendObs = new IntersectionObserver((entries) => {
        entries.forEach((e) => legend.classList.toggle('scrolled', !e.isIntersecting));
    }, { threshold: 0 });
    legendObs.observe(heroEl);

    // Set sticky header offset based on legend height
    function updateLegendHeight() {
        document.documentElement.style.setProperty('--legend-height', legend.offsetHeight + 'px');
    }
    updateLegendHeight();
    window.addEventListener('resize', updateLegendHeight);

    // Detect stuck section headers
    function initStickyObservers() {
        const headers = document.querySelectorAll('.section-header');
        const legendH = legend.offsetHeight;
        // A sentinel 1px above the sticky top — when it leaves the viewport, the header is stuck
        const obs = new IntersectionObserver((entries) => {
            entries.forEach((e) => {
                e.target.nextElementSibling.classList.toggle('stuck', !e.isIntersecting);
            });
        }, { rootMargin: `-${legendH}px 0px 0px 0px`, threshold: 0 });

        headers.forEach((h) => {
            const sentinel = document.createElement('div');
            sentinel.className = 'sticky-sentinel';
            sentinel.style.cssText = 'height:1px;width:1px;pointer-events:none;';
            h.parentNode.insertBefore(sentinel, h);
            obs.observe(sentinel);
        });
    }

    // Initial render
    setLanguage(currentLang);
    </script>
